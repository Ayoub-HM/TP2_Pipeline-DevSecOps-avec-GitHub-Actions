name: DevSecOps Pipeline

on:
  push:
    branches: [ main, test ]
    tags:
      - "v*"
  pull_request:
    branches: [ main, test ]

env:
  REGISTRY: ghcr.io
  SCAN_IMAGE_TAG: scan

jobs:
  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

  security-analysis:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: secret-scanning
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ./Dockerfile
          config: ./.hadolint.yml
          failure-threshold: warning

  build-docker-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: security-analysis
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Normalize image name to lowercase
        run: echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ env.SCAN_IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image as artifact
        run: docker save "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ env.SCAN_IMAGE_TAG }}" --output docker-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: docker-image.tar

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-docker-image
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Normalize image name to lowercase
        run: echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
        shell: bash

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load --input docker-image.tar

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ env.SCAN_IMAGE_TAG }}
          scanners: vuln,misconfig,secret
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"
          version: v0.69.3
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

      - name: Upload Trivy artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif

      - name: Run Grype vulnerability scanner
        id: grype-scan
        uses: anchore/scan-action@v7
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ env.SCAN_IMAGE_TAG }}
          fail-build: false
          output-format: sarif

      - name: Upload Grype results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.grype-scan.outputs.sarif }}
          category: grype-image

      - name: Upload Grype artifact
        uses: actions/upload-artifact@v4
        with:
          name: grype-results
          path: ${{ steps.grype-scan.outputs.sarif }}

      - name: Run Trivy security gate
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ env.SCAN_IMAGE_TAG }}
          scanners: vuln,misconfig,secret
          exit-code: "1"
          ignore-unfixed: true
          skip-setup-trivy: true
          severity: CRITICAL,HIGH

      - name: Run Grype security gate
        uses: anchore/scan-action@v7
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ env.SCAN_IMAGE_TAG }}
          fail-build: true
          severity-cutoff: high

  push-to-ghcr:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Normalize image name to lowercase
        run: echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.20.9
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
