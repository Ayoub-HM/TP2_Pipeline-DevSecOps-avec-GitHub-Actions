name: SonarQube

on:
  push:
    branches: [ main, test ]
  pull_request:
    branches: [ main, test ]
  workflow_dispatch:

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate SonarQube configuration
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::Missing GitHub secret SONAR_TOKEN"
            exit 1
          fi
        shell: bash

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.0.0
